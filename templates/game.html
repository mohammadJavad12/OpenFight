<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Terraxis - Military Command</title>
<style>
:root{
    --bg:#0b1220;
    --panel:#162131;
    --panel-light:#1d2b3f;
    --border:#32475f;

    --blue:#59a8ff;
    --gold:#f9c74f;
    --green:#7bed9f;
    --red:#ff6b6b;

    --text:#f1f5f9;
    --muted:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:
        radial-gradient(circle at top,#1a2940 0%,#0b1220 50%,#081018 100%);
    font-family:Segoe UI,Tahoma,sans-serif;
    color:var(--text);
}

canvas{
    position:absolute;
    inset:0;
    display:block;
}

/* =========================
   SPAWN SCREEN
========================= */

#spawn-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:500;

    pointer-events:none;
}

.message{
    pointer-events:auto;

    background:rgba(22,33,49,.95);

    border:1px solid rgba(89,168,255,.4);

    border-radius:18px;

    padding:28px;

    text-align:center;

    box-shadow:
        0 15px 40px rgba(0,0,0,.45);

    color:white;
}

.message h2{
    margin-bottom:8px;
}

/* =========================
   TOP INFO
========================= */

#info{
    position:absolute;
    top:12px;
    left:12px;

    z-index:100;

    background:rgba(22,33,49,.88);

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.08);

    border-radius:16px;

    padding:12px 18px;

    color:white;

    box-shadow:
        0 8px 24px rgba(0,0,0,.35);

    min-width: 180px;
}

#info div {
    margin: 2px 0;
}

/* =========================
   LOGOUT
========================= */

.logout-btn{
    position:absolute;
    top:12px;
    left:290px;

    z-index:100;

    border:none;

    background:#dc4c4c;

    color:white;

    padding:10px 14px;

    border-radius:12px;

    cursor:pointer;

    transition:.18s;
}

.logout-btn:hover{
    background:#ef5f5f;
    transform:translateY(-1px);
}

/* =========================
   LEADERBOARD
========================= */

#leaderboard{
    position:absolute;

    right:12px;
    top:12px;

    width:280px;
    max-height:340px;

    overflow-y:auto;

    z-index:100;

    background:rgba(22,33,49,.88);

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.08);

    border-radius:18px;

    box-shadow:
        0 8px 24px rgba(0,0,0,.35);
}

#leaderboard h3{
    padding:14px;

    border-bottom:1px solid rgba(255,255,255,.08);

    background:rgba(255,255,255,.03);

    font-size:15px;
}

.country-row{
    display:flex;
    justify-content:space-between;

    padding:10px 14px;

    transition:.15s;

    border-bottom:1px solid rgba(255,255,255,.04);
}

.country-row:hover{
    background:rgba(255,255,255,.04);
}

.country-color{
    width:10px;
    height:10px;

    border-radius:50%;

    display:inline-block;

    margin-right:6px;
}

/* =========================
   BOTTOM BAR
========================= */

#bottom-bar{
    position:absolute;

    left:50%;
    bottom:12px;

    transform:translateX(-50%);

    width:1050px;
    max-width:95vw;

    z-index:200;

    overflow:hidden;

    border-radius:22px;

    background:rgba(22,33,49,.9);

    backdrop-filter:blur(16px);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
        0 10px 35px rgba(0,0,0,.4);
}

/* =========================
   RESOURCE BAR
========================= */

#resource-row{
    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:10px 14px;

    background:rgba(255,255,255,.02);

    border-bottom:1px solid rgba(255,255,255,.08);
    flex-wrap: wrap;
    gap: 8px;
}

.resource{
    color:white;
    font-size:20px;
    font-weight:700;
}

.army{
    color:var(--blue);
}

.money{
    color:var(--gold);
}

.resource-group{
    display:flex;
    align-items:center;
    gap:10px;
}

.resource-item{
    display:flex;
    align-items:center;
    gap:6px;

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,.06),
            rgba(255,255,255,.02)
        );

    border:1px solid rgba(255,255,255,.07);

    border-radius:16px;

    padding:6px 12px;

    box-shadow:
        0 4px 12px rgba(0,0,0,.25);
}

.resource-item img{
    width:28px;
    height:28px;

    image-rendering:pixelated;
}

.resource-item .value{
    font-size:18px;
    font-weight:700;
}

.resource-item.iron .value{
    color:#c7d0d9;
}

.resource-item.uranium .value{
    color:#7bed9f;
}

.stat-card {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 18px;
    font-weight: 700;
    padding: 4px 12px;
    background: rgba(255,255,255,.05);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.07);
}

/* =========================
   STATUS
========================= */

#status-row{
    padding:8px 14px;

    background:rgba(0,0,0,.15);

    border-bottom:1px solid rgba(255,255,255,.08);

    color:#d6dde6;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
}

#selected-info{
    margin-left:15px;
    color:var(--blue);
}

/* =========================
   BUILD MENU
========================= */

#building-row{
    display:flex;
    justify-content:center;
    gap:6px;

    padding:8px;

    overflow-x:auto;
}

.build-btn{
    width:88px;
    height:88px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    color:white;

    background:
        linear-gradient(
            180deg,
            #31465f,
            #1a2635
        );

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
        0 4px 18px rgba(0,0,0,.35);

    transition:.18s;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    flex-shrink:0;
}

.build-btn:hover:not(:disabled){
    transform:
        translateY(-3px)
        scale(1.03);

    background:
        linear-gradient(
            180deg,
            #3f5f85,
            #24364c
        );

    box-shadow:
        0 8px 20px rgba(89,168,255,.25);
}

.build-btn img{
    width:38px;
    height:38px;

    image-rendering:pixelated;
}

.build-btn .name{
    font-size:10px;
    margin-top:4px;
}

.build-btn.active{
    border:2px solid #59a8ff;

    box-shadow:
        0 0 15px rgba(89,168,255,.45);
}

.build-btn:disabled{
    opacity:.45;
    cursor:not-allowed;
}

.missile-btn{
    background:
        linear-gradient(
            180deg,
            #6b2b3d,
            #3e1722
        );
}

.missile-btn:hover:not(:disabled) {
    background:
        linear-gradient(
            180deg,
            #8a3a52,
            #4e1f2a
        );
}

.nuke-btn{
    background:
        linear-gradient(
            180deg,
            #702222,
            #431313
        );
}

.nuke-btn:hover:not(:disabled) {
    background:
        linear-gradient(
            180deg,
            #8a2a2a,
            #551919
        );
}

/* =========================
   ADMIN PANEL
========================= */

#adminToggle {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 1000;
    background: #34495e;
    color: white;
    padding: 6px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: 0.2s;
}

#adminToggle:hover {
    background: #4a6a82;
    transform: scale(1.05);
}

#adminPanel {
    position: fixed;
    top: 60px;
    right: 300px;
    z-index: 999;
    max-width: 420px;
    min-width: 300px;
    background: rgba(20, 20, 30, 0.95);
    backdrop-filter: blur(10px);
    border: 1px solid #444;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    max-height: 80vh;
    overflow-y: auto;
    display: none;
}

#adminPanel h3 {
    color: #ffd700;
    margin: 0 0 10px 0;
    font-size: 16px;
}

.admin-controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
}

.admin-controls button {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
    flex: 1;
    min-width: 80px;
}

.admin-controls button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.admin-controls button:hover:not(:disabled) {
    transform: scale(1.05);
}

#adminStartBtn {
    background: #27ae60;
    color: white;
}

#adminEndBtn {
    background: #e74c3c;
    color: white;
}

#adminRefreshBtn {
    background: #3498db;
    color: white;
}

.status-display {
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 6px;
    margin-top: 8px;
}

.status-display p {
    margin: 3px 0;
    color: #ccc;
    font-size: 13px;
}

.status-display strong {
    color: #fff;
}

#statusText {
    font-weight: bold;
}

.status-waiting { color: #f1c40f; }
.status-active { color: #2ecc71; }
.status-ended { color: #e74c3c; }

/* =========================
   END GAME RESULTS
========================= */

#endGameResults {
    display: none;
    margin-top: 10px;
    background: rgba(0,0,0,0.4);
    padding: 10px;
    border-radius: 6px;
    border: 2px solid #ffd700;
}

#endGameResults h4 {
    color: #ffd700;
    margin: 0 0 8px 0;
    font-size: 14px;
}

#endGameResults .winner-text {
    color: #ffd700;
    font-weight: bold;
    font-size: 16px;
}

#scoresDisplay {
    max-height: 200px;
    overflow-y: auto;
    margin-top: 5px;
}

.score-row {
    padding: 4px 8px;
    margin: 2px 0;
    border-radius: 4px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.03);
}

.score-row.winner {
    background: rgba(255, 215, 0, 0.15);
    border-left: 3px solid #ffd700;
    font-weight: bold;
}

.score-row .score-details {
    font-size: 11px;
    color: #94a3b8;
}

/* =========================
   CONNECTION
========================= */

#connection-status{
    animation:pulse 1.6s infinite;
}

@keyframes pulse{
    0%{opacity:.4;}
    50%{opacity:1;}
    100%{opacity:.4;}
}

/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{
    width:8px;
    height:8px;
}

::-webkit-scrollbar-track{
    background:#0f172a;
}

::-webkit-scrollbar-thumb{
    background:#334155;
    border-radius:10px;
}

::-webkit-scrollbar-thumb:hover{
    background:#475569;
}

/* =========================
   RESPONSIVE
========================= */

@media (max-width: 768px) {
    #info {
        font-size: 12px;
        padding: 8px 12px;
        min-width: auto;
    }
    
    #leaderboard {
        width: 200px;
        max-height: 200px;
        right: 8px;
        top: 8px;
    }
    
    #adminPanel {
        right: 8px;
        left: 8px;
        max-width: none;
        top: 60px;
        min-width: auto;
    }
    
    .build-btn {
        width: 68px;
        height: 72px;
    }
    
    .build-btn img {
        width: 28px;
        height: 28px;
    }
    
    .build-btn .name {
        font-size: 8px;
    }
    
    #bottom-bar {
        width: 98vw;
        bottom: 6px;
    }
    
    .stat-card {
        font-size: 14px;
        padding: 2px 8px;
    }
    
    .resource-item {
        padding: 4px 8px;
    }
    
    .resource-item .value {
        font-size: 14px;
    }
    
    .logout-btn {
        top: 8px;
        left: 180px;
        padding: 6px 10px;
        font-size: 12px;
    }
}
</style>
</head>
<body>

<div id="spawn-overlay">
<div class="message">
<h2>COMMAND DEPLOYMENT</h2>
<p>Select an empty land tile to establish your nation.</p>
</div>
</div>

<div id="info" class="panel">
<div><strong id="player-name">Player</strong></div>
<div>Country: <strong id="player-country">-</strong></div>
<div>Status <span id="connection-status">🟡</span></div>
</div>

<button class="logout-btn" onclick="logout()">Leave</button>

<div id="leaderboard" class="panel">
<h3>WORLD POWERS</h3>
<div id="army-list"></div>
</div>

<!-- Admin Panel -->
<button id="adminToggle" onclick="toggleAdminPanel()">🔐 Admin</button>

<div id="adminPanel">
    <h3>🛠️ Admin Controls</h3>
    <div class="admin-controls">
        <button id="adminStartBtn" onclick="adminStartGame()">🚀 Start</button>
        <button id="adminEndBtn" onclick="adminEndGame()">⏹ End</button>
        <button id="adminRefreshBtn" onclick="refreshGameStatus()">🔄 Refresh</button>
    </div>
    <div class="status-display">
        <p><strong>Status:</strong> <span id="statusText" class="status-waiting">waiting</span></p>
        <p><strong>Players:</strong> <span id="playerCount">0</span></p>
        <p><strong>Active Players:</strong> <span id="activePlayerCount">0</span></p>
        <p id="timeRemainingDisplay" style="display:none;">
            <strong>⏱️ Time Remaining:</strong> <span id="timeRemaining">0</span>
        </p>
    </div>
    <div id="endGameResults">
        <h4>🏆 Game Over!</h4>
        <p><span class="winner-text">Winner:</span> <span id="winnerDisplay">Unknown</span></p>
        <div id="scoresDisplay"></div>
    </div>
</div>

<div id="bottom-bar" class="panel">
<div id="resource-row">
    <div class="stat-card">⚔ <span id="army-current">0</span>/<span id="army-max">0</span></div>
    <div class="stat-card">💰 <span id="money-current">0</span></div>

    <div class="resource-group">
        <div class="resource-item iron">
            <img src="../static/images/iron.png" alt="Iron">
            <span class="value" id="iron-current">0</span>
        </div>
        <div class="resource-item uranium">
            <img src="../static/images/uranium.png" alt="Uranium">
            <span class="value" id="uranium-current">0</span>
        </div>
    </div>
</div>

<div id="status-row">
    <span id="target-status">Awaiting Orders</span>
    <span id="selected-info" style="margin-left:20px;color:#58a6ff"></span>
</div>

<div id="building-row">

    <button class="build-btn" onclick="buildSelected('city')">
        <img src="../static/images/cityAlt1.png" alt="City">
        <span class="name">City</span>
    </button>
    <button class="build-btn" onclick="buildSelected('factory')">
        <img src="../static/images/factoryAlt1.png" alt="Factory">
        <span class="name">Factory</span>
    </button>
    <button class="build-btn" onclick="buildSelected('port')">
        <img src="../static/images/port1.png" alt="Port">
        <span class="name">Port</span>
    </button>
    <button class="build-btn" onclick="buildSelected('iron_mine')">
        <img src="../static/images/iron_mine.png" alt="Iron Mine">
        <span class="name">Iron Mine</span>
    </button>
    <button class="build-btn" onclick="buildSelected('uranium_mine')">
        <img src="../static/images/uranium_mine.png" alt="Uranium Mine">
        <span class="name">Uranium Mine</span>
    </button>
    <button class="build-btn" onclick="buildSelected('launcher')">
        <img src="../static/images/silo1.png" alt="Launcher">
        <span class="name">Launcher</span>
    </button>
    <button class="build-btn missile-btn" id="conventional-btn" onclick="launchMissileFromSelected('conventional')">
        💥<span class="name">Missile</span>
    </button>
    <button class="build-btn nuke-btn" id="nuke-btn" onclick="launchMissileFromSelected('nuke')">
        ☢<span class="name">Nuke</span>
    </button>

</div>
</div>

<canvas id="worldCanvas"></canvas>

<script>
// Pass version to game.js
window.gameVersion = '{{ version }}';
</script>
<script src="/static/game.js?v={{ version }}"></script>

</body>
</html>
